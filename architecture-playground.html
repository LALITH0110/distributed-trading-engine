<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trading Engine — Architecture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f11;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:9px 16px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:13px;font-weight:600;color:#f1f5f9}
header small{font-size:11px;color:#475569}
.wrap{display:flex;flex:1;min-height:0}
.side{width:238px;flex-shrink:0;background:#0d0d0f;border-right:1px solid #1e293b;display:flex;flex-direction:column;overflow-y:auto}
.sec{padding:10px 12px;border-bottom:1px solid #1e293b}
.stitle{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#475569;margin-bottom:8px}
/* presets */
.prow{display:flex;flex-wrap:wrap;gap:4px}
.pb{background:#1a2332;color:#94a3b8;border:1px solid #263348;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer}
.pb:hover{background:#263348;color:#e2e8f0}
.pb.on{background:#1d4ed8;color:#fff;border-color:#3b82f6}
/* toggles */
.tr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.tl{display:flex;align-items:center;gap:5px;font-size:11px;color:#cbd5e1;cursor:pointer}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sw{width:26px;height:15px;background:#263348;border-radius:8px;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.sw.on{background:#2563eb}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;background:#fff;border-radius:50%;transition:left .15s}
.sw.on::after{left:13px}
/* conn filters */
.cr{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;user-select:none}
.cl{font-size:11px;color:#94a3b8;flex:1}
.ck{width:13px;height:13px;border:1px solid #334155;border-radius:3px;flex-shrink:0;position:relative}
.ck.on{background:#2563eb;border-color:#2563eb}
.ck.on::after{content:'✓';position:absolute;font-size:9px;color:#fff;top:-1px;left:1px}
/* zoom */
.zr{display:flex;align-items:center;gap:5px}
.zb{background:#1a2332;color:#94a3b8;border:1px solid #263348;border-radius:4px;width:22px;height:22px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zb:hover{background:#263348}
.zv{font-size:11px;color:#475569;min-width:36px;text-align:center}
/* comments */
.clist{display:flex;flex-direction:column;gap:5px}
.ci{background:#1a2332;border-radius:5px;padding:7px 22px 7px 8px;font-size:11px;position:relative}
.cn{color:#60a5fa;font-weight:600;font-size:11px;margin-bottom:2px}
.ct{color:#94a3b8;line-height:1.4}
.cd{position:absolute;top:5px;right:6px;background:none;border:none;color:#334155;cursor:pointer;font-size:15px;line-height:1}
.cd:hover{color:#ef4444}
.empty{font-size:11px;color:#334155;font-style:italic}
/* canvas */
.canv{flex:1;position:relative;overflow:auto;background:#0f0f11;background-image:radial-gradient(#1a2332 1px,transparent 1px);background-size:22px 22px}
#dg .node{cursor:pointer}
#dg .node rect{transition:stroke .15s}
#dg .node:hover rect{stroke-width:2}
/* legend */
.leg{position:absolute;bottom:10px;right:10px;background:rgba(13,13,15,.93);border:1px solid #1e293b;border-radius:5px;padding:8px 10px;font-size:10px;color:#475569;pointer-events:none}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.lr:last-child{margin-bottom:0}
/* prompt */
.parea{border-top:1px solid #1e293b;background:#0d0d0f;padding:9px 14px;flex-shrink:0;display:flex;gap:10px;align-items:flex-start;min-height:78px;max-height:115px}
.ptxt{flex:1;font-family:'SF Mono','Fira Code',monospace;font-size:11px;line-height:1.6;color:#94a3b8;overflow-y:auto;white-space:pre-wrap}
.cpb{background:#1a2332;color:#94a3b8;border:1px solid #263348;border-radius:5px;padding:5px 11px;font-size:11px;cursor:pointer;flex-shrink:0}
.cpb:hover{background:#263348}
.cpb.ok{background:#064e3b;border-color:#10b981;color:#6ee7b7}
/* modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;align-items:center;justify-content:center}
.ov.open{display:flex}
.mdl{background:#1a2332;border:1px solid #263348;border-radius:8px;padding:16px;width:340px}
.mdl h3{font-size:13px;color:#f1f5f9;margin-bottom:3px}
.mdl p{font-size:10px;color:#475569;margin-bottom:9px;font-family:monospace}
.mdl textarea{width:100%;background:#0f0f11;border:1px solid #263348;border-radius:4px;color:#e2e8f0;font-size:12px;padding:8px;resize:vertical;min-height:80px;outline:none;font-family:system-ui}
.mdl textarea:focus{border-color:#3b82f6}
.mf{display:flex;justify-content:flex-end;gap:7px;margin-top:9px}
.mb{background:#0f0f11;color:#94a3b8;border:1px solid #263348;border-radius:4px;padding:5px 11px;font-size:11px;cursor:pointer}
.mb:hover{background:#263348}
.mb.p{background:#2563eb;border-color:#2563eb;color:#fff}
.mb.p:hover{background:#1d4ed8}
</style>
</head>
<body>
<header>
  <h1>Distributed Trading Engine — Architecture Explorer</h1>
  <small>Click a node to add feedback • presets change view</small>
</header>
<div class="wrap">
  <div class="side">
    <div class="sec"><div class="stitle">Presets</div><div class="prow" id="prow"></div></div>
    <div class="sec"><div class="stitle">Layers</div><div id="layers"></div></div>
    <div class="sec"><div class="stitle">Connections</div><div id="conns"></div></div>
    <div class="sec">
      <div class="stitle">Zoom</div>
      <div class="zr">
        <button class="zb" onclick="doZoom(-.15)">−</button>
        <span class="zv" id="zv">100%</span>
        <button class="zb" onclick="doZoom(.15)">+</button>
        <button class="zb" title="reset" onclick="resetZoom()">⊙</button>
      </div>
    </div>
    <div class="sec" style="flex:1">
      <div class="stitle">Comments (<span id="cc">0</span>)</div>
      <div class="clist" id="clist"><p class="empty">Click a node to add feedback</p></div>
    </div>
  </div>
  <div class="canv" id="canv">
    <svg id="dg" width="800" height="640" viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="leg">
    <div class="lr"><svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#3b82f6" stroke-width="2"/></svg><span>Market data</span></div>
    <div class="lr"><svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#10b981" stroke-width="2" stroke-dasharray="5,2"/></svg><span>Orders</span></div>
    <div class="lr"><svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/></svg><span>Exec events</span></div>
    <div class="lr"><svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#334155" stroke-width="1" stroke-dasharray="2,3"/></svg><span>Dependency</span></div>
  </div>
</div>
<div class="parea">
  <div class="ptxt" id="ptxt">Select a preset or click nodes to generate a prompt.</div>
  <button class="cpb" onclick="doCopy()">Copy Prompt</button>
</div>
<div class="ov" id="ov">
  <div class="mdl">
    <h3 id="mh"></h3><p id="ms"></p>
    <textarea id="mta" placeholder="Describe what you want to change or ask about this component…"></textarea>
    <div class="mf">
      <button class="mb" onclick="closeModal()">Cancel</button>
      <button class="mb p" onclick="saveComment()">Save</button>
    </div>
  </div>
</div>
<script>
// ── LAYER CONFIG ─────────────────────────────────────────────
const LI = {
  scripts:  { label:'Scripts / Entry',   color:'#3b82f6', fill:'#091929', stroke:'#1d4ed8' },
  feed:     { label:'Feed / Data',       color:'#06b6d4', fill:'#071e29', stroke:'#0e7490' },
  strategy: { label:'Strategy',          color:'#10b981', fill:'#051c11', stroke:'#059669' },
  engine:   { label:'Risk / Matching',   color:'#f97316', fill:'#1a0e00', stroke:'#c2410c' },
  support:  { label:'Support Libs',      color:'#8b5cf6', fill:'#0f0a1e', stroke:'#7c3aed' },
  external: { label:'External Services', color:'#ec4899', fill:'#1a0514', stroke:'#be185d' },
};

// ── CONNECTION TYPES ─────────────────────────────────────────
const CT = {
  data:  { label:'Market data (PUB/SUB)',    color:'#3b82f6', dash:'none', w:2   },
  order: { label:'Order flow (PUSH/PULL)',   color:'#10b981', dash:'6,3',  w:1.6 },
  event: { label:'Exec / events',           color:'#ef4444', dash:'4,3',  w:1.4 },
  dep:   { label:'Module dependency',       color:'#334155', dash:'2,3',  w:1   },
};

// ── NODES ────────────────────────────────────────────────────
// Layout: hot path flows TOP → BOTTOM
// Row 0 y=20:  Scripts
// Row 1 y=110: FeedHandler | Datasets
// Row 2 y=220: Strategies (BaseStrategy, MeanRev, MLSignal)
// Row 3 y=335: RiskGateway | MatchingEngine | LimitOrderBook
// Row 4 y=445: Config | ZMQFactory | Proto | scikit-learn
// Row 5 y=540: ZeroMQ | Binance/ccxt | Yahoo/yfinance
const NODES = [
  // scripts
  { id:'pipeline', label:'start_pipeline.py', sub:'scripts/',        x:20,  y:20,  w:160, h:38, layer:'scripts'  },
  { id:'train',    label:'train_ml_model.py', sub:'scripts/',        x:200, y:20,  w:160, h:38, layer:'scripts'  },
  { id:'fetch',    label:'fetch_datasets.py', sub:'scripts/',        x:390, y:20,  w:160, h:38, layer:'scripts'  },
  // feed
  { id:'feed',     label:'FeedHandler',       sub:'engine/feed_handler.py',   x:160, y:110, w:160, h:44, layer:'feed'     },
  { id:'ds',       label:'Datasets',          sub:'engine/datasets.py',       x:490, y:110, w:130, h:44, layer:'feed'     },
  // strategy
  { id:'base',     label:'BaseStrategy (ABC)',sub:'engine/strategy.py',       x:20,  y:220, w:155, h:44, layer:'strategy' },
  { id:'meanrev',  label:'MeanReversionStrategy', sub:'engine/strategy.py',  x:200, y:220, w:185, h:44, layer:'strategy' },
  { id:'mlsig',    label:'MLSignalStrategy',  sub:'engine/strategy.py',       x:415, y:220, w:155, h:44, layer:'strategy' },
  // engine
  { id:'risk',     label:'RiskGateway',       sub:'engine/risk_gateway.py',   x:130, y:335, w:155, h:44, layer:'engine'   },
  { id:'me',       label:'MatchingEngine',    sub:'engine/matching_engine.py',x:315, y:335, w:160, h:44, layer:'engine'   },
  { id:'lob',      label:'LimitOrderBook',    sub:'engine/lob.py',            x:505, y:335, w:145, h:44, layer:'engine'   },
  // support
  { id:'cfg',      label:'Config/Topology',   sub:'engine/config.py',         x:20,  y:445, w:130, h:44, layer:'support'  },
  { id:'zmq',      label:'ZMQFactory',        sub:'engine/zmq_factory.py',    x:175, y:445, w:135, h:44, layer:'support'  },
  { id:'proto',    label:'Proto Messages',    sub:'proto/messages_pb2.py',    x:340, y:445, w:150, h:44, layer:'support'  },
  { id:'sklearn',  label:'scikit-learn',      sub:'joblib + HGB',             x:520, y:445, w:120, h:44, layer:'support'  },
  // external
  { id:'zmqext',   label:'ZeroMQ',            sub:'pyzmq',                    x:20,  y:540, w:110, h:40, layer:'external' },
  { id:'binance',  label:'Binance / ccxt',    sub:'REST API',                 x:165, y:540, w:135, h:40, layer:'external' },
  { id:'yahoo',    label:'Yahoo / yfinance',  sub:'REST API',                 x:335, y:540, w:145, h:40, layer:'external' },
];

// ── CONNECTIONS ───────────────────────────────────────────────
const CONNS = [
  // market data broadcast
  { f:'feed',    t:'meanrev', type:'data',  lbl:'MarketDataTick'  },
  { f:'feed',    t:'mlsig',   type:'data',  lbl:'MarketDataTick'  },
  // order flow
  { f:'meanrev', t:'risk',    type:'order', lbl:'NewOrderSingle'  },
  { f:'mlsig',   t:'risk',    type:'order', lbl:'NewOrderSingle'  },
  { f:'risk',    t:'me',      type:'order', lbl:'Checked Order'   },
  // exec reports (upward)
  { f:'me',      t:'meanrev', type:'event', lbl:'ExecutionReport' },
  { f:'me',      t:'mlsig',   type:'event', lbl:'ExecutionReport' },
  { f:'risk',    t:'meanrev', type:'event', lbl:'REJECT'          },
  // matching → LOB
  { f:'me',      t:'lob',     type:'dep'                          },
  // inheritance
  { f:'base',    t:'meanrev', type:'dep',   lbl:'extends'         },
  { f:'base',    t:'mlsig',   type:'dep',   lbl:'extends'         },
  // scripts launch
  { f:'pipeline',t:'feed',    type:'dep'                          },
  { f:'pipeline',t:'risk',    type:'dep'                          },
  { f:'pipeline',t:'me',      type:'dep'                          },
  { f:'pipeline',t:'meanrev', type:'dep'                          },
  { f:'train',   t:'ds',      type:'dep'                          },
  { f:'fetch',   t:'ds',      type:'dep'                          },
  // config wires
  { f:'cfg',     t:'feed',    type:'dep'                          },
  { f:'cfg',     t:'risk',    type:'dep'                          },
  { f:'cfg',     t:'me',      type:'dep'                          },
  // zmq factory
  { f:'zmq',     t:'feed',    type:'dep'                          },
  { f:'zmq',     t:'risk',    type:'dep'                          },
  { f:'zmq',     t:'me',      type:'dep'                          },
  // proto
  { f:'proto',   t:'feed',    type:'dep'                          },
  { f:'proto',   t:'risk',    type:'dep'                          },
  { f:'proto',   t:'me',      type:'dep'                          },
  { f:'proto',   t:'base',    type:'dep'                          },
  // external
  { f:'zmqext',  t:'zmq',     type:'dep'                          },
  { f:'ds',      t:'binance', type:'order', lbl:'OHLCV'           },
  { f:'ds',      t:'yahoo',   type:'order', lbl:'OHLCV'           },
  { f:'mlsig',   t:'sklearn', type:'dep',   lbl:'joblib'          },
  { f:'feed',    t:'ds',      type:'dep'                          },
];

// ── PRESETS ───────────────────────────────────────────────────
const PRESETS = [
  {
    name: 'Full System',
    layers: { scripts:1, feed:1, strategy:1, engine:1, support:1, external:1 },
    conns:  { data:1, order:1, event:1, dep:1 },
  },
  {
    name: 'Hot Path',
    layers: { scripts:0, feed:1, strategy:1, engine:1, support:0, external:0 },
    conns:  { data:1, order:1, event:1, dep:0 },
  },
  {
    name: 'Data Flow',
    layers: { scripts:0, feed:1, strategy:1, engine:0, support:0, external:0 },
    conns:  { data:1, order:0, event:0, dep:0 },
  },
  {
    name: 'Dependencies',
    layers: { scripts:1, feed:1, strategy:1, engine:1, support:1, external:0 },
    conns:  { data:0, order:0, event:0, dep:1 },
  },
  {
    name: 'ML Pipeline',
    layers: { scripts:1, feed:0, strategy:1, engine:0, support:1, external:1 },
    conns:  { data:0, order:0, event:0, dep:1 },
  },
];

// ── NODE MAP ──────────────────────────────────────────────────
const NM = {};
NODES.forEach(n => NM[n.id] = n);

// ── STATE ─────────────────────────────────────────────────────
const S = {
  layers:   { scripts:1, feed:1, strategy:1, engine:1, support:1, external:1 },
  conns:    { data:1, order:1, event:1, dep:1 },
  zoom:     1,
  comments: [],
  preset:   'Full System',
  pending:  null,
};

// ── PATH HELPER ───────────────────────────────────────────────
function getPath(a, b) {
  // same row: horizontal S-curve from right side of a to left side of b
  if (a.y === b.y) {
    const sx = a.x + a.w, sy = a.y + a.h / 2;
    const tx = b.x,       ty = b.y + b.h / 2;
    const mx = (sx + tx) / 2;
    return { d:'M '+sx+' '+sy+' C '+mx+' '+sy+','+mx+' '+ty+','+tx+' '+ty,
             lx:mx, ly:sy - 12, down:1 };
  }

  const sfx = a.x + a.w / 2, sfy = a.y + a.h; // bottom-center source
  const tfx = b.x + b.w / 2, tfy = b.y;       // top-center target

  if (tfy >= sfy - 5) {
    // downward: cubic bezier
    const my = (sfy + tfy) / 2;
    return { d:'M '+sfx+' '+sfy+' C '+sfx+' '+my+','+tfx+' '+my+','+tfx+' '+tfy,
             lx:(sfx+tfx)/2, ly:(sfy+tfy)/2, down:1 };
  }

  // upward: route around right side
  const rx = Math.max(a.x + a.w, b.x + b.w) + 55;
  const fcy = a.y + a.h / 2, tcy = b.y + b.h / 2;
  return { d:'M '+(a.x+a.w)+' '+fcy+' C '+(rx+20)+' '+fcy+','+(rx+20)+' '+tcy+','+(b.x+b.w)+' '+tcy,
           lx:rx + 10, ly:(fcy+tcy)/2, down:0 };
}

// ── SVG RENDER ────────────────────────────────────────────────
function renderSVG() {
  const parts = [];

  // arrowhead markers
  parts.push('<defs>');
  Object.entries(CT).forEach(([k, ct]) => {
    parts.push(
      '<marker id="ar-'+k+'" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">'+
      '<polygon points="0 0,8 3,0 6" fill="'+ct.color+'"/></marker>'
    );
  });
  parts.push('</defs>');

  // connections (draw under nodes)
  CONNS.forEach(function(c) {
    if (!S.conns[c.type]) return;
    var fn = NM[c.f], tn = NM[c.t];
    if (!fn || !tn) return;
    if (!S.layers[fn.layer] || !S.layers[tn.layer]) return;

    var ct = CT[c.type];
    var p = getPath(fn, tn);
    var op = c.type === 'dep' ? '.25' : '.82';
    parts.push(
      '<path d="'+p.d+'" fill="none" stroke="'+ct.color+'"'+
      ' stroke-width="'+ct.w+'" stroke-dasharray="'+ct.dash+'"'+
      ' stroke-opacity="'+op+'" marker-end="url(#ar-'+c.type+')"/>'
    );
    if (c.lbl && c.type !== 'dep' && p.down) {
      parts.push(
        '<rect x="'+(p.lx-30)+'" y="'+(p.ly-7)+'" width="60" height="13" fill="#0f0f11" rx="2"/>'+
        '<text x="'+p.lx+'" y="'+(p.ly+3)+'" fill="'+ct.color+'" font-size="8"'+
        ' text-anchor="middle" font-family="monospace" opacity=".85">'+c.lbl+'</text>'
      );
    }
  });

  // nodes
  NODES.forEach(function(n) {
    if (!S.layers[n.layer]) return;
    var L = LI[n.layer];
    var hasCmt = S.comments.some(function(c){ return c.target === n.id; });
    var sc = hasCmt ? '#f59e0b' : L.stroke;
    var sw = hasCmt ? '2' : '1';

    parts.push(
      '<g class="node" onclick="nodeClick(\''+n.id+'\')">'+
      '<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'"'+
      ' rx="6" fill="'+L.fill+'" stroke="'+sc+'" stroke-width="'+sw+'"/>'+
      '<text x="'+(n.x+n.w/2)+'" y="'+(n.y+16)+'" fill="#e2e8f0" font-size="11"'+
      ' font-weight="600" text-anchor="middle" font-family="system-ui">'+n.label+'</text>'
    );
    if (n.sub) {
      parts.push(
        '<text x="'+(n.x+n.w/2)+'" y="'+(n.y+29)+'" fill="'+L.color+'" font-size="9"'+
        ' text-anchor="middle" font-family="monospace" opacity=".65">'+n.sub+'</text>'
      );
    }
    if (hasCmt) {
      parts.push('<circle cx="'+(n.x+n.w-6)+'" cy="'+(n.y+6)+'" r="4" fill="#f59e0b"/>');
    }
    parts.push('</g>');
  });

  // layer labels on left edge
  var seen = {};
  NODES.forEach(function(n) {
    if (S.layers[n.layer] && !seen[n.layer]) { seen[n.layer] = n.y; }
  });
  Object.entries(seen).forEach(function(kv) {
    var L = LI[kv[0]];
    parts.push(
      '<text x="2" y="'+(kv[1]+13)+'" fill="'+L.color+'" font-size="8"'+
      ' font-weight="700" font-family="system-ui" opacity=".4">'+
      L.label.toUpperCase()+'</text>'
    );
  });

  document.getElementById('dg').innerHTML = parts.join('');
}

// ── ZOOM ──────────────────────────────────────────────────────
function doZoom(d) {
  S.zoom = Math.min(2, Math.max(.3, S.zoom + d));
  applyZoom();
}
function resetZoom() { S.zoom = 1; applyZoom(); }
function applyZoom() {
  var svg = document.getElementById('dg');
  svg.style.transform = 'scale('+S.zoom+')';
  svg.style.transformOrigin = 'top left';
  svg.style.display = 'block';
  document.getElementById('zv').textContent = Math.round(S.zoom * 100) + '%';
}

// ── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar() {
  // presets
  var pr = document.getElementById('prow');
  PRESETS.forEach(function(p) {
    var b = document.createElement('button');
    b.className = 'pb' + (p.name === S.preset ? ' on' : '');
    b.textContent = p.name;
    b.dataset.n = p.name;
    b.onclick = function() { applyPreset(p); };
    pr.appendChild(b);
  });

  // layers
  var layEl = document.getElementById('layers');
  Object.keys(LI).forEach(function(k) {
    var L = LI[k];
    var row = document.createElement('div');
    row.className = 'tr';
    var lbl = document.createElement('div');
    lbl.className = 'tl';
    lbl.innerHTML = '<div class="dot" style="background:'+L.color+'"></div>' + L.label;

    var sw = document.createElement('div');
    sw.className = 'sw' + (S.layers[k] ? ' on' : '');
    sw.id = 'sw-' + k;
    sw.onclick = function() {
      S.layers[k] = S.layers[k] ? 0 : 1;
      sw.classList.toggle('on', !!S.layers[k]);
      clearPreset();
      update();
    };
    row.appendChild(lbl);
    row.appendChild(sw);
    layEl.appendChild(row);
  });

  // connections
  var connEl = document.getElementById('conns');
  Object.keys(CT).forEach(function(k) {
    var ct = CT[k];
    var row = document.createElement('div');
    row.className = 'cr';

    var lineEl = document.createElement('svg');
    lineEl.setAttribute('width', '22');
    lineEl.setAttribute('height', '10');
    var dashAttr = ct.dash !== 'none' ? ' stroke-dasharray="'+ct.dash+'"' : '';
    lineEl.innerHTML = '<line x1="0" y1="5" x2="22" y2="5" stroke="'+ct.color+'" stroke-width="2"'+dashAttr+'/>';

    var lbl = document.createElement('span');
    lbl.className = 'cl';
    lbl.textContent = ct.label;

    var ck = document.createElement('div');
    ck.className = 'ck' + (S.conns[k] ? ' on' : '');
    ck.id = 'ck-' + k;

    row.appendChild(lineEl);
    row.appendChild(lbl);
    row.appendChild(ck);
    row.onclick = function() {
      S.conns[k] = S.conns[k] ? 0 : 1;
      ck.classList.toggle('on', !!S.conns[k]);
      clearPreset();
      update();
    };
    connEl.appendChild(row);
  });
}

function applyPreset(p) {
  Object.assign(S.layers, p.layers);
  Object.assign(S.conns, p.conns);
  S.preset = p.name;
  Object.keys(LI).forEach(function(k) {
    var sw = document.getElementById('sw-' + k);
    if (sw) sw.classList.toggle('on', !!S.layers[k]);
  });
  Object.keys(CT).forEach(function(k) {
    var ck = document.getElementById('ck-' + k);
    if (ck) ck.classList.toggle('on', !!S.conns[k]);
  });
  syncPreset();
  update();
}

function clearPreset() { S.preset = ''; syncPreset(); }
function syncPreset() {
  document.querySelectorAll('.pb').forEach(function(b) {
    b.classList.toggle('on', b.dataset.n === S.preset);
  });
}

// ── MODAL ─────────────────────────────────────────────────────
function nodeClick(id) {
  var n = NM[id];
  if (!n) return;
  S.pending = n;
  document.getElementById('mh').textContent = n.label;
  document.getElementById('ms').textContent = n.sub || '';
  var ex = S.comments.find(function(c){ return c.target === id; });
  document.getElementById('mta').value = ex ? ex.text : '';
  document.getElementById('ov').classList.add('open');
  setTimeout(function(){ document.getElementById('mta').focus(); }, 40);
}
function closeModal() {
  document.getElementById('ov').classList.remove('open');
  S.pending = null;
}
function saveComment() {
  var txt = document.getElementById('mta').value.trim();
  if (!txt) { closeModal(); return; }
  var idx = S.comments.findIndex(function(c){ return c.target === S.pending.id; });
  var entry = { id: Date.now(), target: S.pending.id, label: S.pending.label, sub: S.pending.sub || '', text: txt };
  if (idx >= 0) S.comments[idx] = entry;
  else S.comments.push(entry);
  closeModal();
  update();
}
function delCmt(id) {
  S.comments = S.comments.filter(function(c){ return c.id !== id; });
  update();
}

// ── COMMENTS PANEL ────────────────────────────────────────────
function renderComments() {
  var el = document.getElementById('clist');
  document.getElementById('cc').textContent = S.comments.length;
  if (!S.comments.length) {
    el.innerHTML = '<p class="empty">Click a node to add feedback</p>';
    return;
  }
  el.innerHTML = '';
  S.comments.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'ci';
    d.innerHTML =
      '<div class="cn">'+c.label+'</div>'+
      '<div class="ct">'+c.text.slice(0,85)+(c.text.length>85?'…':'')+'</div>'+
      '<button class="cd" onclick="delCmt('+c.id+')">×</button>';
    el.appendChild(d);
  });
}

// ── PROMPT ────────────────────────────────────────────────────
function updatePrompt() {
  var visLayers = Object.keys(S.layers).filter(function(k){ return S.layers[k]; })
    .map(function(k){ return LI[k].label; });
  var allOn = visLayers.length === Object.keys(LI).length;

  var p = 'This is the Distributed Trading Engine architecture';
  if (!allOn) p += ', showing: ' + visLayers.join(', ');
  p += '.\n\n';
  p += 'Stack: Python + ZeroMQ (PUB/SUB, PUSH/PULL) + Protobuf (FIX-lite schema). ';
  p += '5 OS processes: FeedHandler (GBM/stress/replay ~10K ticks/sec), RiskGateway (fat-finger, position limits, token-bucket), MatchingEngine (price-time priority LOB with ring buffers), and 2 strategy nodes (MeanReversionStrategy z-score + MLSignalStrategy HGB classifier).';

  if (S.comments.length) {
    p += '\n\nFeedback on specific components:\n';
    S.comments.forEach(function(c) {
      p += '\n**' + c.label + '** (' + c.sub + '):\n' + c.text + '\n';
    });
  } else {
    p += '\n\n[Click nodes to add targeted feedback, then copy this prompt into Claude.]';
  }
  document.getElementById('ptxt').textContent = p;
}

function doCopy() {
  var t = document.getElementById('ptxt').textContent;
  navigator.clipboard.writeText(t).then(function() {
    var b = document.querySelector('.cpb');
    b.textContent = 'Copied!'; b.classList.add('ok');
    setTimeout(function(){ b.textContent='Copy Prompt'; b.classList.remove('ok'); }, 1400);
  });
}

// ── UPDATE ────────────────────────────────────────────────────
function update() {
  renderSVG();
  renderComments();
  updatePrompt();
}

// ── EVENTS ────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
document.getElementById('ov').addEventListener('click', function(e) {
  if (e.target === document.getElementById('ov')) closeModal();
});

// ── BOOT ──────────────────────────────────────────────────────
buildSidebar();
update();
applyZoom();
</script>
</body>
</html>
